; PHP Configuration for Development

; Error reporting
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Logging
log_errors = On
error_log = /var/log/php_errors.log

; Upload limits
upload_max_filesize = 10M
post_max_size = 10M

; Memory
memory_limit = 256M

; Timezone
date.timezone = Europe/Stockholm
